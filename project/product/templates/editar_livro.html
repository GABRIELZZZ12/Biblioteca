{% extends "base.html" %}

{% block title %}Editar Livro{% endblock %}

{% block content %}
<h2 style="text-align:center; color:#d53601;">Editar Livro</h2>
<form method="POST" action="/livro/editar/{{ livro[0] }}" style="max-width:500px; margin:0 auto;">
    <div class="form-group">
        <label for="titulo">Título:</label>
        <input type="text" name="titulo" value="{{ livro[1] }}" required>
    </div>

    <div class="form-group">
        <label for="autor">Autor:</label>
        <input type="text" name="autor" value="{{ livro[2] }}" required>
    </div>

    <div class="form-group">
        <label for="ano">Ano:</label>
        <input type="number" name="ano" value="{{ livro[3] }}">
    </div>

    <div class="form-group">
        <label for="faixa_etaria">Faixa Etária:</label>
        <input type="text" name="faixa_etaria" value="{{ livro[4] }}">
    </div>

    <button type="submit">Salvar Alterações</button>
</form>
{% endblock %}

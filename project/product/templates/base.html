<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Biblioteca{% endblock %}</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f9fafb;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center; /* Centraliza tudo horizontalmente */
    }
    header {
        background-color: #fff;
        padding: 1rem;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        width: 100%;
        text-align: center;
    }
    header h1 {
        color: #d53601;
        margin: 0;
    }
    nav {
        background-color: #f5f5f5;
        padding: 1rem;
        width: 100%;
    }
    nav ul {
        display: flex;
        justify-content: center; /* Centraliza os links */
        gap: 2rem;
        list-style: none;
        margin: 0;
        padding: 0;
    }
    nav a {
        text-decoration: none;
        color: #333;
        font-weight: 500;
        transition: color 0.3s ease, border-bottom 0.3s ease;
        padding-bottom: 0.2rem;
    }
    nav a:hover {
        color: #d53601;
        border-bottom: 2px solid #d53601;
    }
    main {
        padding: 2rem;
        max-width: 800px; /* Limita a largura do conteúdo */
        width: 100%;
        text-align: center; /* Centraliza texto dentro do main */
    }
    footer {
        text-align: center;
        padding: 1rem;
        background-color: #fff;
        margin-top: 2rem;
        font-size: 0.9rem;
        color: #555;
        border-top: 1px solid #eee;
        width: 100%;
    }
    table {
        margin: 0 auto; /* Centraliza tabelas */
        border-collapse: collapse;
        width: 80%;
    }
    table th, table td {
        border: 1px solid #ccc;
        padding: 0.5rem;
        text-align: center;
    }
    table th {
        background-color: #f5f5f5;
    }
  form .form-group {
    display: flex;
    justify-content: space-between; /* label à esquerda, input à direita */
    align-items: center;
    margin-bottom: 1rem;
}

form label {
    flex: 1;
    text-align: right;
    margin-right: 1rem;
    font-weight: bold;
}

form input, form select {
    flex: 2;
    padding: 0.4rem;
    border: 1px solid #ccc;
    border-radius: 4px;
}

</style>

</head>
<body>
    <header>
        <h1>Biblioteca</h1>
    </header>
    <nav>
        <ul>
            <li><a href="/livro">Cadastrar Livro</a></li>
            <li><a href="/pessoa">Cadastrar Pessoa</a></li>
            <li><a href="/emprestimo">Registrar Empréstimo</a></li>
        </ul>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        &copy; 2026 - Sistema de Biblioteca
    </footer>
</body>
</html>
